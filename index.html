        /* Project Area Polish */

        /* 1. Add depth and interaction to main project cards (now text-focused) */
        div.bg-\[\#0d0d0f\].border-\[\#1a1a1e\].rounded-3xl {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
            background: linear-gradient(145deg, #111116 0%, #0a0a0c 100%) !important;
            padding: 3rem !important;
            border-color: #222228 !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Hide the massive video/image block to make it cleaner */
        .aspect-video {
            display: none !important;
        }

        div.bg-\[\#0d0d0f\].border-\[\#1a1a1e\].rounded-3xl:hover {
            transform: translateY(-8px) scale(1.01) !important;
            box-shadow: 0 20px 40px rgba(232, 178, 122, 0.12) !important;
            border-color: rgba(232, 178, 122, 0.4) !important;
        }

        /* 2. Improve typography & readability for project descriptions */
        div.bg-\[\#0d0d0f\] p.text-\[\#a1a1aa\] {
            max-width: 65ch !important;
            line-height: 1.7 !important;
            font-size: 1.05rem !important;
        }

        /* 3. Make the tech pills interactive */
        div.border-\[\#2a2a32\].rounded-full {
            transition: all 0.3s ease !important;
            cursor: default;
        }

        div.border-\[\#2a2a32\].rounded-full:hover {
            border-color: #e8b27a !important;
            color: #e8b27a !important;
            background-color: rgba(232, 178, 122, 0.1) !important;
        }

        /* 4. Fix cramped terminal header */
        div.bg-\[\#0d0d0f\]>div.border-b {
            padding: 16px 24px !important;
        }

        /* 5. Reveal 3D background without breaking text color */
        html,
        body {
            /* Removing background here so it doesn't hide the canvas */
            color: #ffffff;
        }

        #root,
        #root>div,
        #root>div>div.min-h-screen {
            background-color: transparent !important;
        }

        /* Initial cinematic hide */
        #root {
            opacity: 0;
            transform: translateY(-120px) scale(0.95);
            filter: blur(20px);
            transition: opacity 2.5s cubic-bezier(0.16, 1, 0.3, 1), transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), filter 2.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #root.reveal {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0px);
            pointer-events: auto;
        }

        /* Keep project cards solid */
        div.bg-\[\#0d0d0f\].border-\[\#1a1a1e\].rounded-3xl {
            background-color: #0d0d0f !important;
        }

        /* 6. Hide default React loader to use Three.js dust as loader */
        div.bg-\[\#08080a\].z-\[100\] {
            display: none !important;
        }

        /* 7. Three.js Canvas Background */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            /* Let clicks pass through to the portfolio */
            background-color: #050505;
            /* Canvas acts as the global dark background */
        }

        /* 8. Hide the custom React circle/dot cursor and restore system cursor */
        .cursor-dot,
        .cursor-ring {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        body,
        a,
        button,
        [role="button"] {
            cursor: auto !important;
        }
